<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent World Cup Sweep 2026</title>
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="WC Sweep">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  /* ============================================================
     BRAND TOKENS
     --brand is the Agent purple. I approximated it as #6C2BD9 —
     paste your exact hex here and the whole site re-skins.
     Signature: owner names set like a football-shirt nameplate.
     ============================================================ */
  :root{
    --brand:#6C2BD9;
    --brand-deep:#4A1D96;
    --brand-bright:#8B5CF6;
    --brand-tint:#F3EEFD;
    --ink:#241a3a;
    --ink-soft:#4a4063;
    --muted:#8a7fa6;
    --line:#ebe5f6;
    --bg:#f6f3fc;
    --card:#ffffff;
    --gold:#f0a500;        /* leader accent */
    --live:#e0467a;        /* live pulse */
    --shadow:0 1px 2px rgba(74,29,150,.05), 0 8px 26px rgba(74,29,150,.08);
    --shadow-lg:0 14px 44px rgba(74,29,150,.18);
    --r-sm:8px; --r:14px; --r-lg:22px;
    --plate: ui-sans-serif,-apple-system,"Segoe UI",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.45; -webkit-font-smoothing:antialiased;
  }
  header{
    position:sticky; top:0; z-index:50; color:#fff; padding:14px 20px 12px;
    background:linear-gradient(125deg,var(--brand-deep),var(--brand) 55%,var(--brand-bright));
    box-shadow:0 6px 26px rgba(74,29,150,.28);
  }
  .head-inner{max-width:1180px; margin:0 auto; display:flex; align-items:center; gap:12px; flex-wrap:nowrap}
  .crest-img{width:36px; height:36px; flex:none; object-fit:contain}
  .titles{min-width:0; flex:1}
  .titles h1{font-size:18px; margin:0; letter-spacing:-.2px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .titles p{margin:2px 0 0; font-size:12.5px; color:#e6dcfb; letter-spacing:.3px}
  .head-status{margin-left:auto; display:flex; align-items:center; gap:9px; flex-wrap:wrap}
  .pill{
    display:inline-flex; align-items:center; gap:7px; background:rgba(255,255,255,.13);
    border:1px solid rgba(255,255,255,.2); padding:7px 12px; border-radius:999px;
    font-size:12px; font-weight:600; color:#fff;
  }
  .dot{width:8px; height:8px; border-radius:50%; background:#cdbdf3}
  .pill.is-live .dot{background:var(--live); animation:pulse 1.8s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(224,70,122,.6)}70%{box-shadow:0 0 0 7px rgba(224,70,122,0)}100%{box-shadow:0 0 0 0 rgba(224,70,122,0)}}
  .btn-refresh{background:rgba(255,255,255,.16); color:#fff; border:1px solid rgba(255,255,255,.22);
    padding:7px 14px; border-radius:999px; font-size:12px; font-weight:700; cursor:pointer}
  .btn-refresh:hover{background:rgba(255,255,255,.28)}
  .head-actions{margin-left:auto; display:flex; align-items:center; gap:8px}
  .btn-header{background:rgba(255,255,255,.16); color:#fff; border:1px solid rgba(255,255,255,.22);
    padding:7px 14px; border-radius:999px; font-size:12px; font-weight:700; cursor:pointer; display:inline-flex; align-items:center; gap:6px}
  .btn-header:hover{background:rgba(255,255,255,.28)}
  .btn-info{width:30px; height:30px; border-radius:50%; background:rgba(255,255,255,.16); color:#fff;
    border:1px solid rgba(255,255,255,.22); font-size:14px; font-weight:800; cursor:pointer;
    display:grid; place-items:center; font-style:italic; font-family:Georgia,serif; line-height:1}
  .btn-info:hover{background:rgba(255,255,255,.28)}
  .info-panel{display:none; align-items:center; gap:9px; flex-wrap:wrap;
    max-width:1180px; margin:0 auto; padding:10px 20px 14px; border-top:1px solid rgba(255,255,255,.15)}
  .info-panel.is-open{display:flex}

  main{max-width:1180px; margin:0 auto; padding:22px 18px 120px}
  .lead{display:flex; gap:14px; background:var(--card); border:1px solid var(--line);
    border-radius:var(--r); padding:14px 16px; box-shadow:var(--shadow); margin-bottom:24px;
    font-size:13.5px; color:var(--ink-soft)}
  .lead b{color:var(--ink)} .lead .hint{color:var(--muted); font-size:12.5px}

  .section-label{display:flex; align-items:baseline; gap:10px; margin:0 2px 12px}
  .section-label .eyebrow{font-size:11px; font-weight:800; letter-spacing:1.4px; text-transform:uppercase; color:var(--brand)}
  .section-label h2{font-size:15px; margin:0; font-weight:800}

  .board-wrap{margin-bottom:28px}
  .leaderboard{background:var(--card); border:1px solid var(--line); border-radius:var(--r); box-shadow:var(--shadow); overflow:hidden}
  .lb-row{display:flex; align-items:center; gap:12px; padding:9px 14px}
  .lb-row+.lb-row{border-top:1px solid var(--line)}
  .lb-row.lead-1{background:#fffaeb; box-shadow:inset 3px 0 0 var(--gold)}
  .lb-rank{font-size:11px; font-weight:800; color:var(--muted); width:16px; flex:none; text-align:center}
  .lb-name{font-family:var(--plate); font-weight:800; text-transform:uppercase; letter-spacing:.6px;
    font-size:16px; line-height:1; color:var(--brand-deep); flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .lb-row.zero .lb-name{color:#c8c0d8}
  .lb-right{display:flex; align-items:center; gap:10px; flex:none}
  .lb-flags{display:flex; gap:3px}
  .lb-flag{width:22px; height:15px; border-radius:2px; object-fit:cover; flex:none; box-shadow:0 0 0 1px rgba(36,26,58,.1)}
  .lb-flag-emoji{width:22px; height:15px; border-radius:2px; display:grid; place-items:center; font-size:11px; background:#efeaf8; flex:none}
  .lb-pts-val{font-size:14px; font-weight:800; color:var(--ink); min-width:26px; text-align:right}
  .lb-pts-label{font-size:10px; font-weight:700; color:var(--muted)}

  .groups{display:grid; grid-template-columns:repeat(auto-fill,minmax(360px,1fr)); gap:18px}
  .group-wrap{display:flex; flex-direction:column}
  .group{background:var(--card); border:1px solid var(--line); border-radius:var(--r-lg);
    box-shadow:var(--shadow); display:flex; flex-direction:column}
  .group-head{display:flex; align-items:center; gap:11px; padding:14px 16px 12px; border-bottom:1px solid var(--line)}
  .group-badge{width:34px; height:34px; border-radius:10px; flex:none; display:grid; place-items:center;
    background:linear-gradient(135deg,var(--brand),var(--brand-deep)); color:#fff; font-weight:800; font-size:15px}
  .group-head h3{margin:0; font-size:13px; font-weight:800; letter-spacing:.4px}
  .group-head .sub{font-size:11px; color:var(--muted); font-weight:600}

  table.standings{width:100%; border-collapse:collapse; font-size:12px}
  .standings thead th{text-align:center; font-size:9.5px; letter-spacing:.6px; text-transform:uppercase;
    color:var(--muted); font-weight:700; padding:9px 4px 7px}
  .standings thead th.team{text-align:left; padding-left:16px}
  .standings tbody td{padding:7px 4px; text-align:center; border-top:1px solid var(--line)}
  .standings tbody tr:nth-child(-n+2) td:first-child{box-shadow:inset 3px 0 0 var(--brand)}
  .standings .team-cell{text-align:left; padding-left:14px; display:flex; align-items:center; gap:9px}
  .standings .flag{width:22px; height:15px; border-radius:2px; object-fit:cover; flex:none; box-shadow:0 0 0 1px rgba(36,26,58,.1)}
  .standings .tcol{display:flex; flex-direction:column; line-height:1.05; min-width:0}
  .standings .tname{font-weight:700; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .standings .towner{font-family:var(--plate); text-transform:uppercase; letter-spacing:.5px; font-weight:800;
    font-size:11px; color:var(--brand); margin-top:1px}
  .standings .pts{font-weight:800; color:var(--ink)}

  .fixtures{padding:0; display:flex; flex-direction:column; gap:4px; margin-top:6px}
  .fx-label{font-size:9.5px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); font-weight:800; margin:10px 4px 0; padding-top:2px}
  .fx-date-row{font-size:10px; font-weight:700; color:var(--muted); letter-spacing:.4px; padding:8px 4px 0; text-transform:uppercase}
  .fixture{display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:8px; padding:10px 12px; background:var(--card); border:1px solid var(--line); border-radius:10px; box-shadow:var(--shadow)}
  .fixture + .fixture{border-top:none}
  .side{display:flex; align-items:center; gap:9px; min-width:0}
  .side.away{flex-direction:row-reverse; text-align:right}
  .side .flag{width:30px; height:20px; border-radius:3px; object-fit:cover; flex:none; box-shadow:0 0 0 1px rgba(36,26,58,.12), var(--shadow)}
  .side .meta{display:flex; flex-direction:column; min-width:0; line-height:1}
  .side .team{font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .side .owner{font-family:var(--plate); text-transform:uppercase; font-weight:800; letter-spacing:.7px;
    font-size:18px; margin-top:3px; color:var(--brand-deep); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .center{display:flex; flex-direction:column; align-items:center; gap:5px}
  .kick{font-size:10px; font-weight:700; color:var(--muted); white-space:nowrap; letter-spacing:.2px}
  .scorebox{display:flex; align-items:center; gap:5px; background:var(--brand-deep); border-radius:10px; padding:5px 6px}
  .scorebox input{width:26px; height:30px; border:none; border-radius:6px; text-align:center; font-size:16px;
    font-weight:800; color:var(--ink); background:#fff; font-variant-numeric:tabular-nums; -moz-appearance:textfield}
  .scorebox input::-webkit-outer-spin-button,.scorebox input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .scorebox input:focus{outline:2px solid var(--gold); outline-offset:1px}
  .scorebox input.unset{color:var(--muted); background:#efeaf8}
  .scorebox .sep{color:#c9b9f2; font-weight:800; font-size:13px}
  .match-status{font-size:9.5px; font-weight:800; letter-spacing:.8px; text-transform:uppercase; text-align:center}
  .match-status.ft{color:var(--muted)}
  .match-status.live{color:var(--live); display:flex; align-items:center; gap:4px}
  .match-status.live .dot{width:6px; height:6px; border-radius:50%; background:var(--live); animation:pulse 1.8s infinite; flex:none}

  #groupsView{display:none}
  #ko-rounds-nav{position:sticky; top:var(--header-h,72px); z-index:20; background:var(--bg); overflow-x:auto; margin-bottom:4px}
  #ko-nav-inner{display:flex; gap:6px; padding:8px 12px; flex-wrap:nowrap; overflow-x:auto}
  .ko-nav-title{min-width:unset; cursor:pointer; padding:5px 12px; border-radius:999px; border:1px solid var(--line); background:transparent; font-size:11px; font-weight:800; letter-spacing:1px; text-transform:uppercase; color:var(--muted); white-space:nowrap; transition:background .15s,color .15s,border-color .15s}
  .ko-nav-title.active{background:var(--brand); color:#fff; border-color:var(--brand)}
  .ko-scroll{overflow-x:scroll; scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; scroll-behavior:smooth; padding:0 0 20px}
  .bracket{display:flex; gap:0; align-items:flex-start; min-width:max-content}
  .round{scroll-snap-align:start; min-width:100vw; flex-shrink:0; display:flex; flex-direction:column; gap:12px; padding:10px 14px}
  .round-title{display:none}
  .ko-match{background:var(--card); border:1px solid var(--line); border-radius:12px; box-shadow:var(--shadow); padding:8px; display:flex; flex-direction:column; gap:6px}
  .ko-match.final{border-color:var(--gold); box-shadow:var(--shadow-lg)}
  .ko-slot{display:flex; align-items:center; gap:8px}
  .ko-slot .flag{width:26px; height:17px; border-radius:3px; object-fit:cover; flex:none; box-shadow:0 0 0 1px rgba(36,26,58,.12)}
  .ko-slot .flag.blank{background:#e9e4f3; box-shadow:none}
  .ko-team{font-size:12px; font-weight:700; flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--ink)}
  .ko-tbd{color:var(--muted); font-style:italic}
  .ko-owner{font-family:var(--plate); text-transform:uppercase; font-weight:800; letter-spacing:.5px; font-size:12px; color:var(--brand); width:74px; flex:none; text-align:right; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .ko-sc{width:30px; height:28px; border:1px solid var(--line); border-radius:6px; text-align:center; font-weight:800; font-size:14px; flex:none; -moz-appearance:textfield; background:#fff; color:var(--ink)}
  .ko-sc::-webkit-outer-spin-button,.ko-sc::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .ko-slot.win{background:var(--brand-tint); border-radius:7px}
  .ko-note{text-align:center; color:var(--muted); font-size:12px; margin:4px auto 18px; max-width:560px}

  .view-title{font-size:22px; font-weight:800; margin:0 2px 4px; letter-spacing:-.2px}
  .view-sub{margin:0 2px 20px; color:var(--muted); font-size:13.5px}

  @media (max-width:600px){
    .groups{grid-template-columns:1fr} .side .owner{font-size:16px}
    header{padding:10px 12px 9px}
    .head-inner{gap:8px}
    .titles h1{font-size:15px}
    .crest-img{width:28px; height:28px}
    .btn-header{padding:5px 10px; font-size:11px}
    .btn-info{width:26px; height:26px; font-size:12px}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important}}
</style>
</head>
<body>
<header>
  <div class="head-inner">
    <img src="/logo.png" alt="" class="crest-img">
    <div class="titles">
      <h1>Agent World Cup 26</h1>
    </div>
    <div class="head-actions">
      <button class="btn-header" id="toggleBtn"><span class="arrow">→</span><span id="toggleLabel">Groups</span></button>
      <button class="btn-info" id="infoBtn" aria-label="Status info">i</button>
    </div>
  </div>
  <div class="info-panel" id="infoPanel">
    <span class="pill" id="statusPill"><span class="dot"></span><span id="statusText">Manual mode</span></span>
    <span class="pill" id="updatedPill"></span>
    <button class="btn-refresh" id="refreshBtn">Refresh</button>
  </div>
</header>

<main>
  <section id="groupsView">
    <div class="board-wrap">
      <div class="section-label"><span class="eyebrow">Standings</span><h2>Sweep leaderboard</h2></div>
      <div class="leaderboard" id="leaderboard"></div>
    </div>
    <div class="section-label"><span class="eyebrow">Group stage</span><h2>Fixtures, dates &amp; tables</h2></div>
    <div class="groups" id="groups"></div>
  </section>

  <section id="knockout">
    <h2 class="view-title">Knockout stage</h2>

    <div id="ko-rounds-nav"><div id="ko-nav-inner"></div></div>
  <div class="ko-scroll"><div class="bracket" id="bracket"></div></div>
    <p class="ko-note">Third place play-off &amp; final are decided here. Penalty shoot-out? Nudge a score by one to set who goes through.</p>
  </section>
</main>

<script>
/* ============================================================
   1. ROSTER — owners + flags. (Sweep entrants; never changes.)
   ============================================================ */
const T=(name,code,emoji,owner)=>({name,code,emoji,owner});
const TEAMS=[
  T("Japan","jp","🇯🇵","Emily"),T("Norway","no","🇳🇴","Emily"),
  T("Ivory Coast","ci","🇨🇮","Josh"),T("Switzerland","ch","🇨🇭","Josh"),T("Saudi Arabia","sa","🇸🇦","Josh"),
  T("Argentina","ar","🇦🇷","Katie"),T("Sweden","se","🇸🇪","Katie"),
  T("Czech Republic","cz","🇨🇿","Andy"),T("South Korea","kr","🇰🇷","Andy"),T("Croatia","hr","🇭🇷","Andy"),
  T("France","fr","🇫🇷","Fiona"),T("Egypt","eg","🇪🇬","Fiona"),
  T("Turkey","tr","🇹🇷","Ben"),T("Iraq","iq","🇮🇶","Ben"),
  T("Algeria","dz","🇩🇿","Tom"),T("USA","us","🇺🇸","Tom"),
  T("Scotland","gb-sct","🏴󠁧󠁢󠁳󠁣󠁴󠁿","Aaron"),T("Ecuador","ec","🇪🇨","Aaron"),
  T("Canada","ca","🇨🇦","Teza"),T("DR Congo","cd","🇨🇩","Teza"),
  T("Haiti","ht","🇭🇹","George"),T("New Zealand","nz","🇳🇿","George"),
  T("Uruguay","uy","🇺🇾","Jeanette"),T("Tunisia","tn","🇹🇳","Jeanette"),T("Iran","ir","🇮🇷","Jeanette"),
  T("Brazil","br","🇧🇷","Sam"),T("Uzbekistan","uz","🇺🇿","Sam"),T("Mexico","mx","🇲🇽","Sam"),
  T("Cape Verde","cv","🇨🇻","Alex"),T("Jordan","jo","🇯🇴","Alex"),
  T("Austria","at","🇦🇹","Adam"),T("Belgium","be","🇧🇪","Adam"),
  T("Paraguay","py","🇵🇾","Grace"),T("Portugal","pt","🇵🇹","Grace"),T("Ghana","gh","🇬🇭","Grace"),
  T("Qatar","qa","🇶🇦","Sean"),T("South Africa","za","🇿🇦","Sean"),T("Australia","au","🇦🇺","Sean"),
  T("Panama","pa","🇵🇦","Paul"),T("Spain","es","🇪🇸","Paul"),T("Senegal","sn","🇸🇳","Paul"),
  T("Curacao","cw","🇨🇼","James"),T("Morocco","ma","🇲🇦","James"),
  T("Colombia","co","🇨🇴","Jay"),T("England","gb-eng","🏴󠁧󠁢󠁥󠁮󠁧󠁿","Jay"),
  T("Germany","de","🇩🇪","David"),T("Netherlands","nl","🇳🇱","David"),T("Bosnia","ba","🇧🇦","David"),
];
const TByName=Object.fromEntries(TEAMS.map(t=>[t.name,t]));

/* name matching so FIFA's spellings map back to the sweep roster */
const norm=s=>(s||"").toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z]/g,'');
const NORMMAP=Object.fromEntries(TEAMS.map(t=>[norm(t.name),t.name]));
const ALIAS={korearepublic:"South Korea",republicofkorea:"South Korea",unitedstates:"USA",unitedstatesofamerica:"USA",
  turkiye:"Turkey",iriran:"Iran",cotedivoire:"Ivory Coast",czechia:"Czech Republic",congodr:"DR Congo",
  drcongo:"DR Congo",caboverde:"Cape Verde",capeverdeislands:"Cape Verde",bosniaandherzegovina:"Bosnia",bosniaherzegovina:"Bosnia"};
function canon(name){const n=norm(name); return ALIAS[n]||NORMMAP[n]||name;}

/* ============================================================
   2. DRAW — placeholder until the FIFA feed overrides it.
   ============================================================ */
let GROUPS={
  A:["Mexico","South Africa","South Korea","Czech Republic"], B:["Canada","Bosnia","Qatar","Switzerland"],
  C:["Brazil","Morocco","Haiti","Scotland"], D:["USA","Paraguay","Australia","Turkey"],
  E:["Germany","Curacao","Ivory Coast","Ecuador"], F:["Netherlands","Japan","Sweden","Tunisia"],
  G:["Belgium","Egypt","Iran","New Zealand"], H:["Spain","Cape Verde","Saudi Arabia","Uruguay"],
  I:["France","Senegal","Iraq","Norway"], J:["Argentina","Algeria","Austria","Jordan"],
  K:["Portugal","DR Congo","Uzbekistan","Colombia"], L:["England","Croatia","Ghana","Panama"],
};
let LIVE_MATCHES=null;   // {A:[{home,away,utcDate,hs,as}], ...} when feed is connected
let KO_MATCHES=null;     // [{home,away,utcDate,hs,as,stage,...}] knockout fixtures from API
let OFFICIAL_STANDINGS=null; // {A:[{team,position,P,W,D,L,GF,GA,Pts}], ...} from FIFA standings
let DATA_SOURCE="manual";

/* ============================================================
   3. FIFA FEED — server-side function (no CORS), every refresh.
   ============================================================ */
const FEED_URLS=["/.netlify/functions/football-data","/.netlify/functions/bbc","/.netlify/functions/fifa"];
const FEED_CACHE="agent-wc26-feed";
async function pullFeed(force){
  let d=null,err="no feed";
  for(const u of FEED_URLS){
    const url=force?u+(u.includes('?')?'&':'?')+'t='+Date.now():u;
    try{
      const res=await fetch(url, force?{cache:"no-store"}:{}); if(!res.ok){err="feed "+res.status; continue;}
      const j=await res.json(); if(j.error){err=j.error; continue;}
      d=j; break;
    }catch(e){ err=e.message; }
  }
  if(!d) throw new Error(err);
  // The 12 groups below are the verified draw — never overwrite them from a
  // scrape. Attach feed matches to a group only when BOTH teams sit in it
  // (that's a group-stage game; this also skips knockout fixtures).
  if(Array.isArray(d.matches) && d.matches.length){
    const t2g={}; for(const g in GROUPS) GROUPS[g].forEach(t=>t2g[t]=g);
    const by={};
    d.matches.forEach(m=>{
      const h=canon(m.home), a=canon(m.away), gh=t2g[h], ga=t2g[a];
      if(!gh || gh!==ga) return;
      (by[gh]=by[gh]||[]).push(m);
    });
    for(const k in by) by[k].sort((x,y)=>new Date(x.utcDate)-new Date(y.utcDate));
    if(Object.keys(by).length) LIVE_MATCHES=by;
    const koList=[];
    d.matches.forEach(m=>{
      if(!m.home||!m.away) return;
      const h=canon(m.home),a=canon(m.away),gh=t2g[h],ga=t2g[a];
      if(gh&&gh===ga) return; // group stage — already handled
      koList.push(m);
    });
    koList.sort((x,y)=>new Date(x.utcDate)-new Date(y.utcDate));
    if(koList.length) KO_MATCHES=koList;
  }
  DATA_SOURCE=d.source||"feed";
  try{ if(LIVE_MATCHES) localStorage.setItem(FEED_CACHE, JSON.stringify({t:Date.now(),src:DATA_SOURCE,m:LIVE_MATCHES})); }catch(e){}
  return true;
}
function hydrateFeed(){ // render last-known scores immediately on load
  try{ const c=JSON.parse(localStorage.getItem(FEED_CACHE));
    if(c&&c.m&&Object.keys(c.m).length){ LIVE_MATCHES=c.m; DATA_SOURCE=c.src||"feed"; } }catch(e){}
}

const STANDINGS_URL="/.netlify/functions/fifa-standings";
async function pullStandings(){
  const res=await fetch(STANDINGS_URL,{cache:"no-store"});
  if(!res.ok) throw new Error("standings "+res.status);
  const d=await res.json();
  if(d.error) throw new Error(d.error);
  if(Array.isArray(d.standings) && d.standings.length){
    const by={};
    d.standings.forEach(r=>{const k=(r.group||"").replace(/^GROUP[_ ]?/i,"").trim().toUpperCase();
      if(!k||k.length>2) return; (by[k]=by[k]||[]).push(r);});
    for(const k in by) by[k].sort((a,b)=>(a.position||99)-(b.position||99) || (b.Pts||0)-(a.Pts||0));
    OFFICIAL_STANDINGS=by;
  }
  DATA_SOURCE="fifa";
  return true;
}

/* ============================================================
   4. STATE + STORAGE (manual scores / knockout edits)
   ============================================================ */
const KEY="agent-wc26-v1";
let STATE=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{scores:{},ko:{}}}catch(e){return{scores:{},ko:{}}}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(STATE))}catch(e){}}

const KEYS=()=>Object.keys(GROUPS);
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtUK(date){try{return date.toLocaleString('en-GB',{weekday:'short',day:'2-digit',month:'short',timeZone:'Europe/London'});}catch(e){return '';}}
function placeholderKick(gl,md,slot){
  const gi=KEYS().indexOf(gl); const base={1:11,2:17,3:23}[md];
  const day=Math.min(base+Math.floor(gi/2),30); const d=new Date(2026,5,day);
  return d.toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short'});
}

/* unified fixtures: live matches when present, else round-robin */
function fixturesFor(gl){
  const [p,q,r,s]=GROUPS[gl];
  const mk=(h,a,md,slot)=>({id:`${gl}|${h}|${a}`,gl,h,a,md,kick:placeholderKick(gl,md,slot),live:false,feedH:null,feedA:null,htH:null,htA:null,status:""});
  const base=[mk(p,q,1,0),mk(r,s,1,1),mk(p,r,2,0),mk(s,q,2,1),mk(s,p,3,0),mk(q,r,3,1)];
  if(!LIVE_MATCHES||!LIVE_MATCHES[gl]) return base;
  // Build lookup keyed by "home|away" in both orientations so the round-robin
  // order always matches even if the API has teams swapped.
  const api={};
  LIVE_MATCHES[gl].forEach(m=>{
    const h=canon(m.home),a=canon(m.away);
    api[`${h}|${a}`]={...m};
    api[`${a}|${h}`]={...m,home:m.away,away:m.home,hs:m.as,as:m.hs,htH:m.htA,htA:m.htH};
  });
  return base.map(fx=>{
    const m=api[`${fx.h}|${fx.a}`];
    if(!m) return fx;
    return {...fx, live:true, kick:m.utcDate?fmtUK(new Date(m.utcDate)):fx.kick,
      feedH:(m.hs===0||m.hs)?+m.hs:null, feedA:(m.as===0||m.as)?+m.as:null,
      htH:(m.htH===0||m.htH)?+m.htH:null, htA:(m.htA===0||m.htA)?+m.htA:null,
      status:m.status||""};
  });
}
function getH(fx){if(fx.live&&fx.feedH!=null)return fx.feedH; if(fx.live&&fx.status==="IN_PLAY"&&fx.htH!=null)return fx.htH; const m=STATE.scores[fx.id]; return m&&m.h!=null&&m.h!==''?m.h:'';}
function getA(fx){if(fx.live&&fx.feedA!=null)return fx.feedA; if(fx.live&&fx.status==="IN_PLAY"&&fx.htA!=null)return fx.htA; const m=STATE.scores[fx.id]; return m&&m.a!=null&&m.a!==''?m.a:'';}

/* ============================================================
   5. RENDER HELPERS
   ============================================================ */
function flagImg(name,cls){
  const t=TByName[name];
  if(!t) return `<span class="flag blank ${cls||''}"></span>`;
  return `<img class="flag ${cls||''}" src="https://flagcdn.com/w80/${t.code}.png" alt="${t.name}" loading="lazy"
    onerror="this.outerHTML='<span class=&quot;flag ${cls||''}&quot; style=&quot;display:grid;place-items:center;font-size:14px&quot;>${t.emoji}</span>'">`;
}
const ownerOf=name=>TByName[name]?.owner||"—";

function computeStandings(gl){
  const rows={}; GROUPS[gl].forEach(t=>rows[t]={team:t,P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0});
  const played=[];
  fixturesFor(gl).forEach(fx=>{
    const h=getH(fx),a=getA(fx); if(h===''||a==='') return; if(!rows[fx.h]||!rows[fx.a]) return;
    played.push({h:fx.h,a:fx.a,hs:+h,as:+a});
    const H=rows[fx.h],A=rows[fx.a]; H.P++;A.P++;H.GF+=+h;H.GA+=+a;A.GF+=+a;A.GA+=+h;
    if(+h>+a){H.W++;A.L++;H.Pts+=3}else if(+a>+h){A.W++;H.L++;A.Pts+=3}else{H.D++;A.D++;H.Pts++;A.Pts++}
  });
  // FIFA order: points, then overall GD, then overall goals...
  const overall=(x,y)=>y.Pts-x.Pts||(y.GF-y.GA)-(x.GF-x.GA)||y.GF-x.GF;
  // ...then head-to-head among any teams still level.
  function h2h(names){
    const m={}; names.forEach(t=>m[t]={Pts:0,GF:0,GA:0});
    played.forEach(p=>{ if(names.includes(p.h)&&names.includes(p.a)){
      m[p.h].GF+=p.hs;m[p.h].GA+=p.as;m[p.a].GF+=p.as;m[p.a].GA+=p.hs;
      if(p.hs>p.as)m[p.h].Pts+=3; else if(p.as>p.hs)m[p.a].Pts+=3; else {m[p.h].Pts++;m[p.a].Pts++;}
    }});
    return [...names].sort((a,b)=>m[b].Pts-m[a].Pts||(m[b].GF-m[b].GA)-(m[a].GF-m[a].GA)||m[b].GF-m[a].GF||a.localeCompare(b));
  }
  const arr=Object.values(rows).sort(overall);
  const out=[]; let i=0;
  while(i<arr.length){
    let j=i+1; while(j<arr.length && overall(arr[i],arr[j])===0) j++;
    const cluster=arr.slice(i,j);
    if(cluster.length>1){ const order=h2h(cluster.map(r=>r.team));
      cluster.sort((a,b)=>order.indexOf(a.team)-order.indexOf(b.team)||a.team.localeCompare(b.team)); }
    out.push(...cluster); i=j;
  }
  return out;
}
function leaderboard(){
  const acc={};
  TEAMS.forEach(t=>{
    if(!acc[t.owner]) acc[t.owner]={owner:t.owner,Pts:0,W:0,GF:0,teamList:[]};
    acc[t.owner].teamList.push(t);
  });
  KEYS().forEach(gl=>fixturesFor(gl).forEach(fx=>{
    const h=getH(fx),a=getA(fx); if(h===''||a==='') return;
    const oh=ownerOf(fx.h),oa=ownerOf(fx.a); if(!acc[oh]||!acc[oa]) return;
    acc[oh].GF+=+h; acc[oa].GF+=+a;
    if(+h>+a){acc[oh].Pts+=3;acc[oh].W++}else if(+a>+h){acc[oa].Pts+=3;acc[oa].W++}else{acc[oh].Pts++;acc[oa].Pts++}
  }));
  return Object.values(acc).sort((x,y)=>y.Pts-x.Pts||y.W-x.W||y.GF-x.GF||x.owner.localeCompare(y.owner));
}

function render(){renderLeaderboard(); renderGroups();}
function renderLeaderboard(){
  document.getElementById("leaderboard").innerHTML=leaderboard().map((r,i)=>{
    const flags=r.teamList.map(t=>`<img class="lb-flag" src="https://flagcdn.com/w40/${t.code}.png" alt="${t.name}"
      onerror="this.outerHTML='<span class=&quot;lb-flag-emoji&quot;>${t.emoji}</span>'">`).join("");
    return `<div class="lb-row ${i===0&&r.Pts>0?'lead-1':''} ${r.Pts===0?'zero':''}">
      <span class="lb-rank">${i+1}</span>
      <span class="lb-name">${r.owner}</span>
      <div class="lb-right">
        <div class="lb-flags">${flags}</div>
        <span class="lb-pts-val">${r.Pts}</span><span class="lb-pts-label">pts</span>
      </div>
    </div>`;
  }).join("");
}
function renderGroups(){
  document.getElementById("groups").innerHTML=KEYS().map(gl=>{
    const fx=fixturesFor(gl);
    const rows = fx.some(f=>f.md) ? [1,2,3].map(md=>({label:'Matchday '+md, list:fx.filter(f=>f.md===md)}))
                                  : [{label:'Fixtures', list:fx}];
    return `<div class="group-wrap">
      <div class="group">
        <div class="group-head"><div class="group-badge">${gl}</div>
          <div><h3>Group ${gl}</h3><div class="sub">${GROUPS[gl].length} teams · ${fx.length} matches</div></div></div>
        <table class="standings"><thead><tr><th class="team">Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>+/−</th><th>Pts</th></tr></thead>
          <tbody id="st-${gl}"></tbody></table>
      </div>
      <div class="fixtures">${rows.map(r=>`<div class="fx-label">${r.label}</div>${r.list.map(fx=>`${fx.kick?`<div class="fx-date-row">${fx.kick}</div>`:''}${renderFixture(fx)}`).join("")}`).join("")}</div>
    </div>`;
  }).join("");
  renderStandings(); bindScoreInputs();
}
function statusBadge(fx){
  if(!fx.live) return '';
  const s=fx.status;
  if(s==='FINISHED') return '<div class="match-status ft">FT</div>';
  if(s==='IN_PLAY'||s==='PAUSED') return '<div class="match-status live"><span class="dot"></span>Live</div>';
  return '';
}
function renderFixture(fx){
  return `<div class="fixture">
    <div class="side home">${flagImg(fx.h)}<div class="meta"><span class="team">${fx.h}</span><span class="owner">${ownerOf(fx.h)}</span></div></div>
    <div class="center">
      ${statusBadge(fx)?`<div class="kick">${statusBadge(fx)}</div>`:''}
      <div class="scorebox">
        <input type="number" min="0" inputmode="numeric" data-id="${fx.id}" data-side="h" value="${getH(fx)}" class="${getH(fx)===''?'unset':''}" aria-label="${fx.h} score">
        <span class="sep">:</span>
        <input type="number" min="0" inputmode="numeric" data-id="${fx.id}" data-side="a" value="${getA(fx)}" class="${getA(fx)===''?'unset':''}" aria-label="${fx.a} score">
      </div>
    </div>
    <div class="side away">${flagImg(fx.a)}<div class="meta"><span class="team">${fx.a}</span><span class="owner">${ownerOf(fx.a)}</span></div></div>
  </div>`;
}
function renderStandings(){
  KEYS().forEach(gl=>{const tb=document.getElementById("st-"+gl); if(!tb)return;
    let rows;
    if(OFFICIAL_STANDINGS&&OFFICIAL_STANDINGS[gl]){
      rows=OFFICIAL_STANDINGS[gl].map(r=>({team:canon(r.team),P:+r.P||0,W:+r.W||0,D:+r.D||0,L:+r.L||0,GF:+r.GF||0,GA:+r.GA||0,Pts:+r.Pts||0}));
    } else { rows=computeStandings(gl); }
    tb.innerHTML=rows.map(r=>`<tr>
      <td class="team-cell">${flagImg(r.team)}<div class="tcol"><span class="tname">${r.team}</span><span class="towner">${ownerOf(r.team)}</span></div></td>
      <td>${r.P}</td><td>${r.W}</td><td>${r.D}</td><td>${r.L}</td><td>${(r.GF-r.GA)>0?'+':''}${r.GF-r.GA}</td><td class="pts">${r.Pts}</td>
    </tr>`).join("");});
}
function bindScoreInputs(){
  document.querySelectorAll('.scorebox input').forEach(inp=>inp.addEventListener('input',()=>{
    const id=inp.dataset.id,side=inp.dataset.side,v=inp.value===''?'':Math.max(0,parseInt(inp.value)||0);
    const cur=STATE.scores[id]||{h:'',a:''}; cur[side]=v; STATE.scores[id]=cur; save();
    inp.classList.toggle('unset',v===''); renderLeaderboard(); renderStandings();
  }));
}

/* ============================================================
   6. KNOCKOUT BRACKET
   ============================================================ */
const RNDS=[{key:"R32",title:"Round of 32",n:16},{key:"R16",title:"Round of 16",n:8},{key:"QF",title:"Quarter-finals",n:4},{key:"SF",title:"Semi-finals",n:2},{key:"F",title:"Final",n:1}];
let koDefaultScrollApplied=false;
function getKoActiveIdx(){const sc=document.querySelector('.ko-scroll'); if(!sc||!sc.clientWidth)return 1; return Math.round(sc.scrollLeft/sc.clientWidth);}
const stageMap={R32:"LAST_32",R16:"LAST_16",QF:"QUARTER_FINALS",SF:"SEMI_FINALS",F:"FINAL","3P":"THIRD_PLACE"};
function provisional(){
  const order=KEYS(),first=[],second=[];
  order.forEach(gl=>{const s=computeStandings(gl); first.push(s[0]?.team||""); second.push(s[1]?.team||"");});
  const seeds=[];
  for(let i=0;i<order.length;i+=2){seeds.push(first[i],second[i+1]??"",first[i+1]??"",second[i]??"");}
  while(seeds.length<32) seeds.push(""); return seeds;
}
function koApiMatch(r,m){
  if(!KO_MATCHES) return null;
  const st=stageMap[r]; if(!st) return null;
  return KO_MATCHES.filter(x=>x.stage===st)[m]||null;
}
function koGet(r,m,s){
  const api=koApiMatch(r,m);
  if(api) return s==="h"?canon(api.home):canon(api.away);
  const k=`${r}-${m}-${s}`; if(STATE.ko[k]!=null)return STATE.ko[k];
  if(r==="R32"){const sd=provisional(); return sd[m*2+(s==="h"?0:1)]||"";}
  return "";
}
function koSc(r,m,s){
  const manual=STATE.ko[`${r}-${m}-${s}-sc`]; if(manual!=null&&manual!=="")return manual;
  const api=koApiMatch(r,m);
  if(api&&api.status==="FINISHED"){const v=s==="h"?api.hs:api.as; if(v!=null)return v;}
  return "";
}
function koStatus(r,m){
  const api=koApiMatch(r,m); if(!api) return "";
  if(api.status==="FINISHED") return '<div class="match-status ft">FT</div>';
  if(api.status==="IN_PLAY"||api.status==="PAUSED") return '<div class="match-status live"><span class="dot"></span>Live</div>';
  if(api.utcDate){const d=new Date(api.utcDate),now=new Date(); if(d>now) return `<div class="match-status" style="color:var(--muted)">${fmtUK(d)}</div>`;}
  return "";
}
function koWin(r,m){const h=koSc(r,m,"h"),a=koSc(r,m,"a"); if(h===""||a==="")return ""; return +h>+a?koGet(r,m,"h"):+a>+h?koGet(r,m,"a"):"";}
function advance(){
  for(let r=0;r<RNDS.length-1;r++){const c=RNDS[r],n=RNDS[r+1];
    for(let m=0;m<c.n;m++){const w=koWin(c.key,m),nm=Math.floor(m/2),s=(m%2===0)?"h":"a",k=`${n.key}-${nm}-${s}`;
      if(w)STATE.ko[k]=w; else if(STATE.ko[k]!=null)delete STATE.ko[k];}}
  ["h","a"].forEach((s,i)=>{const w=koWin("SF",i); const l=w?(w===koGet("SF",i,"h")?koGet("SF",i,"a"):koGet("SF",i,"h")):""; if(l)STATE.ko[`3P-0-${s}`]=l; else delete STATE.ko[`3P-0-${s}`];});
  save();
}
function koSlot(r,m,s){const t=koGet(r,m,s),win=(koWin(r,m)===t&&t!=="");
  const nameHtml=t?`<span class="ko-team">${t}</span>`:`<span class="ko-team ko-tbd">TBD</span>`;
  return `<div class="ko-slot ${win?'win':''}">${flagImg(t)}${nameHtml}
    <span class="ko-owner">${t?ownerOf(t):''}</span>
    <input class="ko-sc" type="number" min="0" inputmode="numeric" data-r="${r}" data-m="${m}" data-side="${s}" value="${koSc(r,m,s)}" aria-label="score"></div>`;
}
function renderKnockout(){
  advance();
  let html=RNDS.map(rd=>`<div class="round">
    ${Array.from({length:rd.n},(_,m)=>`<div class="ko-match ${rd.key==='F'?'final':''}">${koSlot(rd.key,m,"h")}${koStatus(rd.key,m)}${koSlot(rd.key,m,"a")}</div>`).join("")}</div>`).join("");
  html+=`<div class="round" style="justify-content:flex-start"><div class="ko-match">${koSlot("3P",0,"h")}${koStatus("3P",0)}${koSlot("3P",0,"a")}</div></div>`;
  const br=document.getElementById("bracket"); br.innerHTML=html;
  const navInner=document.getElementById("ko-nav-inner");
  if(navInner){
    const activeIdx=getKoActiveIdx();
    const allRnds=[...RNDS,{key:"3P",title:"Third place"}];
    navInner.innerHTML=allRnds.map((rd,i)=>`<div class="ko-nav-title${i===activeIdx?' active':''}" data-idx="${i}">${rd.title}</div>`).join("");
    navInner.querySelectorAll('.ko-nav-title').forEach(el=>{
      el.addEventListener('click',()=>{const sc=document.querySelector('.ko-scroll'); if(sc) sc.scrollTo({left:+el.dataset.idx*sc.clientWidth,behavior:'smooth'});});
    });
  }
  br.querySelectorAll('.ko-sc').forEach(i=>i.addEventListener('input',e=>{const v=e.target.value===''?'':Math.max(0,parseInt(e.target.value)||0); STATE.ko[`${e.target.dataset.r}-${e.target.dataset.m}-${e.target.dataset.side}-sc`]=v; save(); renderKnockout();}));
  if(!koDefaultScrollApplied){koDefaultScrollApplied=true; setTimeout(()=>{const sc=document.querySelector('.ko-scroll'); if(sc&&sc.clientWidth){const idx=RNDS.findIndex(r=>r.key==='R16'); if(idx>=0) sc.scrollLeft=idx*sc.clientWidth;}},80);}
}

/* ============================================================
   7. VIEW TOGGLE + REFRESH (every 30 min + on load)
   ============================================================ */
let showingKO=true;
document.getElementById("toggleBtn").addEventListener("click",()=>{
  showingKO=!showingKO;
  document.getElementById("groupsView").style.display=showingKO?"none":"block";
  document.getElementById("knockout").style.display=showingKO?"block":"none";
  document.getElementById("toggleLabel").textContent=showingKO?"Groups":"Knockout";
  document.querySelector("#toggleBtn .arrow").textContent=showingKO?"→":"←";
  if(showingKO) renderKnockout(); window.scrollTo({top:0,behavior:"smooth"});
});
document.getElementById("infoBtn").addEventListener("click",()=>{
  document.getElementById("infoPanel").classList.toggle("is-open");
});
function stamp(){const p=document.getElementById("updatedPill"); p.style.display="inline-flex"; p.textContent="Updated "+new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});}
async function refresh(force){
  const pill=document.getElementById("statusPill"),txt=document.getElementById("statusText");
  let live=false;
  try{ await pullFeed(force); live=true; }catch(e){}
  if(live){ pill.classList.add("is-live");
    txt.textContent="Live · "+(DATA_SOURCE==="football-data.org"?"API":DATA_SOURCE==="bbc.co.uk"?"BBC":DATA_SOURCE==="fifa.com"?"FIFA":"feed"); }
  else { pill.classList.toggle("is-live",!!LIVE_MATCHES); txt.textContent=LIVE_MATCHES?"Live · cached":"Manual mode"; }
  render(); if(showingKO) renderKnockout(); stamp();
}
document.getElementById("refreshBtn").addEventListener("click",()=>refresh(true));

hydrateFeed();               // last-known scores appear instantly, before the network
render(); renderKnockout(); stamp(); refresh(false);
setInterval(()=>refresh(false), 60*1000); /* check for new scores every minute */

// Set CSS var so sticky ko-rounds-nav clears the main header
document.documentElement.style.setProperty('--header-h', document.querySelector('header').offsetHeight+'px');
// Update active nav pill as user swipes between rounds
(()=>{const sc=document.querySelector('.ko-scroll'); if(!sc) return;
  sc.addEventListener('scroll',()=>{const idx=Math.round(sc.scrollLeft/(sc.clientWidth||1));
    document.querySelectorAll('.ko-nav-title').forEach((el,i)=>el.classList.toggle('active',i===idx));});})();
</script>
